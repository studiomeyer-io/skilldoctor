name: Publish

# Publishes to npm with provenance when a v* tag is pushed.
# Requires an NPM_TOKEN secret (automation token) in the repo settings.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      # prepublishOnly runs clean + build + test + typecheck + attw as a gate,
      # but we run the gate explicitly too so a failure is obvious in the log.
      - name: Verify (build, test, typecheck, attw)
        run: |
          npm run build
          npm test
          npm run typecheck
          npx --yes @arethetypeswrong/cli@latest --pack .

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
